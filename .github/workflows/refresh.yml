name: Monthly Pricing Refresh

on:
  schedule:
    - cron: '0 10 1 * *'   # 1st of every month at 10am UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python3 scripts/pipeline.py

      - name: Validate output
        run: |
          python3 - << 'PYEOF'
          import pandas as pd, sys
          fc = pd.read_csv("data/forecast.csv")
          ls = pd.read_csv("data/listings_clean.csv")
          print(f"Forecast rows: {len(fc)} | Listings: {len(ls)}")
          if len(fc) == 0 or len(ls) == 0:
              print("❌ Empty data — aborting commit")
              sys.exit(1)
          print("✅ Data looks good")
          PYEOF

      - name: Commit updated data
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name  "GitHub Actions"
          git add data/
          git diff --staged --quiet || git commit -m "auto: monthly refresh $(date -u +%Y-%m)"
          git push
